# 会计系统专业版 — 容器化部署（Postgres 多用户）
#
# 一键启动：  docker compose up --build
#   前端：    http://localhost:8080   （登录 admin/admin123）
#   后端API： http://localhost:8000/docs
#
# API 已全程经 SQLAlchemy ORM 访问数据库（accsys/repo.py），认 DATABASE_URL，
# 因此可直接运行在 PostgreSQL 上（首次启动自动建表并播种科目/用户）。
# 如需改回单机 SQLite：删除 api 的 DATABASE_URL 与 depends_on、以及 db 服务即可。

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: acc
      POSTGRES_PASSWORD: acc
      POSTGRES_DB: accounting
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acc -d accounting"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      JWT_SECRET: "change-me-in-production-please-32-bytes-min"
      DATABASE_URL: "postgresql+psycopg://acc:acc@db:5432/accounting"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
